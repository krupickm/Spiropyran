# SMARTS patterns used by the prep stage to identify atom roles in a
# canonical spiropyran. Patterns are deliberately narrow so they fail loudly
# on non-spiropyran inputs.
#
# CHEMIST REVIEW REQUIRED
# -----------------------
# These v0 patterns match the BIPS-family closed spiropyran scaffold
# (sp3 spiro carbon shared between an indoline N-side and a chromene O-side).
# They will fail on:
#   - open merocyanine forms (the C-O bond is broken)
#   - spiro scaffolds where the spiro carbon is not directly N- and O-substituted
#   - any structure outside the closed BIPS-family connectivity
# Update before running scaffolds beyond closed BIPS-family spiropyrans.

atom_roles:
  # sp3 carbon, member of two rings, bonded to one N and one O neighbour.
  spiro_carbon: "[#6;X4;R2](-[#7])(-[#8])"
  # ring oxygen (X2, in one ring) bonded to a ring-junction sp3 carbon.
  chromene_oxygen: "[#8;X2;R1]-[#6;X4;R2]"
  # sp3 indoline nitrogen (X3, in one ring), bonded to the spiro sp3 carbon.
  indoline_nitrogen: "[#7;X3;R1]-[#6;X4;R2]"
  # gem-disubstituted sp3 carbon in the indoline 5-ring, adjacent to spiro.
  # In project-typical scaffolds this carbon bears methyl + R(big) and is
  # itself a stereocentre; for plain BIPS both substituents are methyl.
  gem_carbon: "[#6;X4;R1]-[#6;X4;R2]"
